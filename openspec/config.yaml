schema: spec-driven

context: |
  Tech stack:
  - WSL (Ubuntu): tmux + Node.js daemon (express, node-pty) + autossh
  - Public server: Ubuntu + Caddy (reverse proxy, HTTPS)
  - Mobile: Capacitor + Android WebView + xterm.js

  Architecture:
  - WSL runs tmux sessions with Claude Code
  - Node.js daemon (:9528) manages tmux sessions via PTY, exposes HTTP/WS API
  - autossh creates SSH reverse tunnel (-R) to public server
  - Caddy on public server reverse-proxies to localhost tunnel port
  - Mobile app connects via HTTPS/WSS to Caddy, renders xterm.js terminal

  Environments:
  - Production: port 9528, domain easyai.wuya.asia
  - Testing: port 9529, domain easyaitest.wuya.asia
  - Both environments are functionally identical, only port/domain differ

  Git workflow:
  - All feature work forks from main branch
  - opsx:propose MUST create a feature/fix branch from main before generating artifacts
  - Branch naming: feature-<topic> for new features, fix-<topic> for bug fixes
  - Feature/fix branches are pushed directly to trigger CI builds (test environment)
  - After testing, /opsx:archive auto-commits, merges to main, pushes, and cleans up the branch
  - main branch push triggers production build and GitHub Release

  Mobile CI:
  - Capacitor Android app, built via GitHub Actions
  - Pushes to any branch with mobile/** changes trigger automatic APK builds
  - Non-main branches build with test server config (easyaitest.wuya.asia)
  - Main branch builds with production server config (easyai.wuya.asia) and uploads to GitHub Release
  - Feature/fix branch APKs available as GitHub Actions artifacts (not Releases)

  Constraints:
  - Daemon binds 127.0.0.1 only (never expose directly to network)
  - Auth via token/Basic Auth
  - Single user system
  - No file browsing/editing in mobile app

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Check openspec/specs/ for existing specs before writing Capabilities section
  specs:
    - Use Given/When/Then format for scenarios
    - Every requirement MUST have at least one scenario
  tasks:
    - Break tasks into chunks of max 2 hours
