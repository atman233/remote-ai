<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1e1e" />
  <title>CC Mobile</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <!-- Top Bar -->
  <div id="topbar">
    <button id="menu-btn" aria-label="项目列表">&#9776;</button>
    <div id="session-info">
      <span id="session-name">未连接</span>
      <span id="connection-dot" class="dot-offline"></span>
    </div>
    <button id="update-btn" class="update-idle" aria-label="检查更新"></button>
    <button id="settings-btn" aria-label="设置">&#9881;</button>
  </div>

  <!-- Side Drawer Overlay -->
  <div id="drawer-overlay"></div>

  <!-- Side Drawer -->
  <div id="drawer">
    <div id="drawer-header">
      <h3>项目列表</h3>
      <button id="drawer-close" aria-label="关闭">&times;</button>
    </div>
    <div id="session-list"></div>
    <div id="drawer-footer">
      <button id="drawer-refresh">刷新</button>
    </div>
  </div>

  <!-- Home Screen -->
  <div id="home-screen">
    <div id="home-content">
      <h2 id="home-title">CC Mobile</h2>
      <div id="recent-list"></div>
      <button id="home-new-btn">+ 新建项目</button>
    </div>
  </div>

  <!-- Terminal -->
  <div id="terminal-container" class="hidden"></div>

  <!-- Status Overlay -->
  <div id="status-overlay" class="hidden">
    <div id="status-text">连接中...</div>
    <button id="status-retry" class="hidden">重试</button>
  </div>

  <!-- Command Panel -->
  <div id="cmd-panel">
    <div id="cmd-panel-handle">─</div>
    <div id="cmd-buttons"></div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h3>设置</h3>
      <label>服务器地址</label>
      <input type="text" id="setting-host" placeholder="relay.example.com" />
      <label>用户名</label>
      <input type="text" id="setting-user" placeholder="用户名" />
      <label>密码</label>
      <input type="password" id="setting-pass" placeholder="密码" />
      <div id="settings-buttons">
        <button id="settings-save">保存</button>
        <button id="settings-cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- New Project Modal -->
  <div id="new-project-modal" class="modal hidden">
    <div class="modal-content">
      <h3>新建项目</h3>
      <label>项目名称</label>
      <input type="text" id="new-proj-name" placeholder="my-project" />
      <label>项目路径</label>
      <input type="text" id="new-proj-path" placeholder="/home/user/projects/my-project" />
      <div id="new-session-buttons">
        <button id="new-proj-create">创建</button>
        <button id="new-proj-cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- History Bottom Sheet -->
  <div id="history-sheet-overlay"></div>
  <div id="history-sheet">
    <div id="history-sheet-header">
      <span>对话历史</span>
      <button id="history-sheet-close" aria-label="关闭">✕</button>
    </div>
    <pre id="history-sheet-content"></pre>
    <div id="history-sheet-error" class="hidden">无法加载完整历史</div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
