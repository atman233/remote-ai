name: Build APK

on:
  push:
    paths:
      - 'mobile/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          MAJOR_MINOR=$(cat VERSION)
          TAG_PATTERN="v${MAJOR_MINOR}.*"
          PATCH=$(git tag -l "$TAG_PATTERN" | wc -l)
          PATCH=$((PATCH + 1))
          VERSION_RAW="${MAJOR_MINOR}.${PATCH}"
          VERSION="v${VERSION_RAW}"
          VERSION_CODE=$PATCH

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_raw=$VERSION_RAW" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION (versionCode: $VERSION_CODE)"

      - name: Set version in package.json
        run: |
          VERSION="${{ steps.version.outputs.version_raw }}"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' mobile/package.json > "$tmp"
          mv "$tmp" mobile/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Set build-time environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "VITE_DEFAULT_HOST=easyai.wuya.asia" >> $GITHUB_ENV
            echo "VITE_APP_ENV=production" >> $GITHUB_ENV
          else
            echo "VITE_DEFAULT_HOST=easyaitest.wuya.asia" >> $GITHUB_ENV
            echo "VITE_APP_ENV=test" >> $GITHUB_ENV
          fi
          echo "VITE_APP_VERSION=${{ steps.version.outputs.version_raw }}" >> $GITHUB_ENV
          echo "VITE_APP_BUILD_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build web frontend
        run: npm run build
        working-directory: mobile

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: mobile

      - name: Decode keystore (production)
        if: github.ref_name == 'main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mobile/android/keystore.jks

      - name: Build APK (production)
        if: github.ref_name == 'main'
        run: |
          cd android && chmod +x ./gradlew && ./gradlew assembleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_raw }} \
            -PkeystorePath=../keystore.jks \
            -PkeystorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.KEY_PASSWORD }}"
        working-directory: mobile

      - name: Build APK (test)
        if: github.ref_name != 'main'
        run: |
          cd android && chmod +x ./gradlew && ./gradlew assembleDebug \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_raw }}
        working-directory: mobile

      - name: Inject APK SHA256 into web build
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            APK=$(ls mobile/android/app/build/outputs/apk/release/*.apk | head -1)
          else
            APK=$(ls mobile/android/app/build/outputs/apk/debug/*.apk | head -1)
          fi
          SHA=$(sha256sum "$APK" | awk '{print $1}')
          echo "VITE_APK_SHA256=$SHA" >> $GITHUB_ENV
          echo "APK_SHA256=$SHA" >> $GITHUB_ENV
          echo "APK: $APK"
          echo "SHA256: $SHA"

      - name: Rebuild web frontend with SHA256
        run: npm run build
        working-directory: mobile

      - name: Rebuild Android with updated web assets
        run: npx cap copy android
        working-directory: mobile

      - name: Rebuild APK with SHA256 bundle (production)
        if: github.ref_name == 'main'
        run: |
          cd android && chmod +x ./gradlew && ./gradlew assembleRelease \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_raw }} \
            -PkeystorePath=../keystore.jks \
            -PkeystorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.KEY_PASSWORD }}"
        working-directory: mobile

      - name: Rebuild APK with SHA256 bundle (test)
        if: github.ref_name != 'main'
        run: |
          cd android && chmod +x ./gradlew && ./gradlew assembleDebug \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_raw }}
        working-directory: mobile

      - name: Compute final APK SHA256
        id: apk_sha
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            APK=$(ls mobile/android/app/build/outputs/apk/release/*.apk | head -1)
          else
            APK=$(ls mobile/android/app/build/outputs/apk/debug/*.apk | head -1)
          fi
          SHA=$(sha256sum "$APK" | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"
          echo "SHA256: $SHA"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-mobile-${{ steps.version.outputs.version }}
          path: mobile/android/app/build/outputs/apk/**/*.apk

      - name: Upload to GitHub Release (production)
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: 'Release ${{ steps.version.outputs.version }}'
          body: |
            Production build from `main` branch.

            Version: ${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}
            Server: easyai.wuya.asia
          files: mobile/android/app/build/outputs/apk/release/*.apk
          make_latest: true

      - name: Notify daemon of production release
        if: github.ref_name == 'main'
        run: |
          if [ -z "${{ secrets.UPDATE_NOTIFY_URL_PROD }}" ]; then
            echo "UPDATE_NOTIFY_URL_PROD not set, skipping"
            exit 0
          fi
          curl -fsSL -X POST "${{ secrets.UPDATE_NOTIFY_URL_PROD }}/api/update/notify" \
            -H "Authorization: Bearer ${{ secrets.UPDATE_NOTIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"production\",
              \"version\": \"${{ steps.version.outputs.version_raw }}\",
              \"sha256\": \"${{ steps.apk_sha.outputs.sha256 }}\",
              \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/ai-remote-${{ steps.version.outputs.version_raw }}.apk\"
            }"

      - name: Create and push version tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Delete old test-latest release and tag
        if: github.ref_name != 'main'
        run: |
          gh api repos/${{ github.repository }}/releases --jq '.[] | select(.tag_name == "test-latest") | .id' | while read id; do
            echo "Deleting release $id"
            gh api repos/${{ github.repository }}/releases/$id -X DELETE
          done
          gh api repos/${{ github.repository }}/git/refs/tags/test-latest -X DELETE 2>/dev/null || true
          sleep 3
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload to GitHub Release (test)
        if: github.ref_name != 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-latest
          name: 'Test: ${{ github.ref_name }}'
          body: |
            Test build from `${{ github.ref_name }}` branch.

            Version: ${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}
            Server: easyaitest.wuya.asia
          files: mobile/android/app/build/outputs/apk/debug/*.apk
          prerelease: true
          make_latest: false

      - name: Notify daemon of test release
        if: github.ref_name != 'main'
        run: |
          if [ -z "${{ secrets.UPDATE_NOTIFY_URL_TEST }}" ]; then
            echo "UPDATE_NOTIFY_URL_TEST not set, skipping"
            exit 0
          fi
          curl -fsSL -X POST "${{ secrets.UPDATE_NOTIFY_URL_TEST }}/api/update/notify" \
            -H "Authorization: Bearer ${{ secrets.UPDATE_NOTIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"test\",
              \"version\": \"${{ steps.version.outputs.version_raw }}\",
              \"sha256\": \"${{ steps.apk_sha.outputs.sha256 }}\",
              \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/test-latest/ai-remote-test-${{ steps.version.outputs.version_raw }}.apk\"
            }"
