# tmux mobile history viewer — keybinding
# Source this from your ~/.tmux.conf, or copy the lines below.

# ── 历史缓冲区（默认2000对AI输出偏小） ──
set -g history-limit 5000

# ── 鼠标支持（滚轮翻历史、点击切窗口/调分屏） ──
set -g mouse on

# ── Copy Mode: vi 键位 ──
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -sel clip'

# ── prefix + H → 浮窗查看最近1000行历史 ──
bind-key H run-shell "/mnt/e/02-easyai-new/tools/tmux/tmux-history"
